<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TLMCOMPANY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4fa; color: #1a2c3e; padding: 24px 20px 48px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 32px; }
        .logo-area h1 { font-size: 1.9rem; font-weight: 800; background: linear-gradient(135deg, #1E3C72, #2A5298); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: -0.5px; }
        .logo-area p { font-size: 0.85rem; color: #54708f; margin-top: 6px; }
        .stats-cards { display: flex; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
        .stat-card { background: white; border-radius: 28px; padding: 20px 28px; flex: 1; min-width: 200px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid rgba(42,127,170,0.15); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #6c8db0; margin-bottom: 12px; }
        .stat-main { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
        .stat-value { font-size: 2.3rem; font-weight: 800; color: #1a4c6e; line-height: 1.2; }
        .stat-change { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; font-size: 1rem; padding: 4px 12px; border-radius: 40px; background: #f0f9f0; }
        .stat-change.positive { color: #2b7e3a; background: #e8f5e9; }
        .stat-change.negative { color: #c62828; background: #ffebee; }
        .stat-period { font-size: 0.7rem; color: #8aa4c0; margin-top: 8px; }
        .stat-change i { font-size: 0.8rem; }
        .filter-card { background: white; border-radius: 32px; padding: 18px 24px; margin-bottom: 28px; box-shadow: 0 6px 14px rgba(0,0,0,0.03); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; }
        .range-title { font-weight: 600; color: #1e3a5f; display: flex; align-items: center; gap: 8px; }
        .date-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
        .date-btn { background: #f1f5f9; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 500; font-family: 'Inter', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; color: #2c3e5c; }
        .date-btn.active { background: #1e466e; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .date-btn:hover:not(.active) { background: #e2e8f0; }
        .custom-range { display: flex; gap: 12px; align-items: center; background: #f8fafc; padding: 5px 16px; border-radius: 48px; }
        .custom-date { border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 32px; font-family: 'Inter', sans-serif; background: white; }
        .apply-btn { background: #2a7faa; color: white; border: none; padding: 8px 18px; border-radius: 32px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .apply-btn:hover { background: #1e5f7e; }
        .chart-main { background: white; border-radius: 32px; padding: 20px 18px; box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.06); margin-bottom: 28px; }
        .chart-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 20px; gap: 12px; }
        .chart-header h3 { font-weight: 700; font-size: 1.3rem; color: #1e3a5f; }
        .period-stats { background: #eef3fc; padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; }
        canvas { max-height: 360px; width: 100%; }
        footer { text-align: center; margin-top: 48px; font-size: 0.75rem; color: #7a97b5; }
        button { cursor: pointer; }
        @media (max-width: 640px) {
            body { padding: 16px; }
            .stat-value { font-size: 1.6rem; }
            .filter-card { flex-direction: column; align-items: stretch; }
            .custom-range { flex-wrap: wrap; justify-content: center; }
            .stats-cards { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <h1><i class="fas fa-chart-line" style="color: #2a7faa;"></i> TLMC</h1>
        </div>
        <div style="background: #eef2f8; padding: 6px 20px; border-radius: 48px; font-weight: 600; color: #1e466e;"></div>
    </div>

    <div class="stats-cards">
        <div class="stat-card">
            <div class="stat-label"><i class="fas fa-chart-line"></i> ДОХОД ЗА ПЕРИОД</div>
            <div class="stat-main">
                <span class="stat-value" id="periodTotalValue">0</span>
                <!--<span class="stat-change" id="periodChangeBadge">
                     <i class="fas fa-chart-line"></i> <span id="changePercent">0%</span> -->
                </span>
            </div>
            <div class="stat-period" id="periodRangeText">за выбранный период</div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><i class="fas fa-calendar-week"></i> ДИНАМИКА (ПОСЛ. 5 ДНЕЙ)</div>
            <div class="stat-main">
                <span class="stat-value" id="last5daysValue">0</span>
                <span class="stat-change" id="last5daysChange">
                    <i class="fas fa-arrow-up"></i> <span id="last5daysAbsChange">0</span>
                </span>
            </div>
            <div class="stat-period">статистика за 5 дней</div>
        </div>
    </div>

    <div class="filter-card">
        <div class="range-title"><i class="fas fa-calendar-alt"></i> Диапазон дат</div>
        <div class="date-buttons" id="periodButtons">
            <button data-period="today" class="date-btn">Сегодня</button>
            <button data-period="week" class="date-btn">Неделя</button>
            <button data-period="month" class="date-btn active">Прошлый месяц</button>
            <button data-period="year" class="date-btn">Год</button>
            <button data-period="all" class="date-btn">Всё время</button>
        </div>
        <div class="custom-range">
            <input type="date" id="customStartDate" class="custom-date" placeholder="с">
            <span>—</span>
            <input type="date" id="customEndDate" class="custom-date" placeholder="по">
            <button id="applyCustomRange" class="apply-btn"><i class="fas fa-check"></i> Применить</button>
        </div>
    </div>

    <div class="chart-main">
        <div class="chart-header">
            <h3><i class="fas fa-chart-line"></i> Динамика прибыли</h3>
            <div class="period-stats" id="periodStatsLabel">📆 Прошлый месяц</div>
        </div>
        <canvas id="profitLineChart" width="800" height="350" style="max-width:100%; height:auto;"></canvas>
    </div>

    <footer><i class="fas fa-chart-pie"></i> Данные хранятся приватно.</footer>
</div>

<script>
    (function() {
        'use strict';
        
        // Константы и начальные данные
        const DEFAULT_INCOMES = [
            { id: 1, amount: 0.14, dateISO: "2026-04-15" },
            { id: 2, amount: 0.11, dateISO: "2026-04-16" },
            { id: 3, amount: 0.09, dateISO: "2026-04-17" },
            { id: 4, amount: 0.12, dateISO: "2026-04-18" },
        ];
        
        // DOM элементы
        const DOM = {
            periodTotalValue: document.getElementById('periodTotalValue'),
            periodRangeText: document.getElementById('periodRangeText'),
            last5daysValue: document.getElementById('last5daysValue'),
            last5daysChange: document.getElementById('last5daysChange'),
            periodStatsLabel: document.getElementById('periodStatsLabel'),
            customStartDate: document.getElementById('customStartDate'),
            customEndDate: document.getElementById('customEndDate'),
            profitLineChart: document.getElementById('profitLineChart')
        };
        
        let allIncomes = [...DEFAULT_INCOMES];
        let currentStartDate = "";
        let currentEndDate = "";
        let activePeriod = "week";
        let lineChart = null;

        // Утилиты для работы с датами
        const DateUtils = {
            formatISO(date) {
                const d = new Date(date);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            },
            
            getRangeForPeriod(period) {
                const now = new Date();
                let start = new Date();
                let end = new Date();
                
                if (period === 'today') {
                    start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    end = new Date(start);
                } else if (period === 'week') {
                    const day = now.getDay();
                    const diffToMonday = day === 0 ? 6 : day - 1;
                    start = new Date(now);
                    start.setDate(now.getDate() - diffToMonday);
                    start.setHours(0,0,0,0);
                    end = new Date(start);
                    end.setDate(start.getDate() + 6);
                } else if (period === 'month') {
                    start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                    end = new Date(now.getFullYear(), now.getMonth(), 0);
                } else if (period === 'year') {
                    start = new Date(now.getFullYear(), 0, 1);
                    end = new Date(now.getFullYear(), 11, 31);
                } else if (period === 'all') {
                    start = new Date(2000, 0, 1);
                    end = new Date(2030, 11, 31);
                }
                
                return { startDate: this.formatISO(start), endDate: this.formatISO(end) };
            },
            
            getPeriodLabel(period, startDate, endDate) {
                const labels = {
                    today: '📅 Сегодня',
                    week: '📆 Текущая неделя',
                    month: '📆 Прошлый месяц',
                    year: '📅 Текущий год',
                    all: '🌍 Всё время'
                };
                
                if (period === 'custom') {
                    return `⚡ ${startDate.slice(5)} — ${endDate.slice(5)}`;
                }
                return labels[period] || '📊 Выбранный диапазон';
            }
        };

        // Утилиты для форматирования валюты
        const CurrencyUtils = {
            format(value) {
                return `€${value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            },
            
            formatPlain(value) {
                return value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            },
            
            formatChange(value) {
                const absVal = Math.abs(value);
                const formatted = this.formatPlain(absVal);
                return value >= 0 ? `+${formatted}` : `-${formatted}`;
            }
        };

        // Управление данными
        const DataManager = {
            getTotal(startISO, endISO) {
                return allIncomes
                    .filter(inc => inc.dateISO >= startISO && inc.dateISO <= endISO)
                    .reduce((sum, inc) => sum + inc.amount, 0);
            },
            
            filterByDate(startISO, endISO) {
                return allIncomes.filter(inc => inc.dateISO >= startISO && inc.dateISO <= endISO);
            },
            
            aggregateByDate(incomesArray) {
                const map = new Map();
                incomesArray.forEach(inc => {
                    map.set(inc.dateISO, (map.get(inc.dateISO) || 0) + inc.amount);
                });
                
                const sortedDates = Array.from(map.keys()).sort();
                return {
                    labels: sortedDates.map(d => {
                        const [year, month, day] = d.split('-');
                        return `${day}.${month}`;
                    }),
                    values: sortedDates.map(d => map.get(d)),
                    dates: sortedDates
                };
            },
            
            calculateDynamics() {
                const today = new Date();
                today.setHours(0,0,0,0);
                const endDate = DateUtils.formatISO(today);
                
                const startLast5 = new Date(today);
                startLast5.setDate(today.getDate() - 4);
                const startLast5ISO = DateUtils.formatISO(startLast5);
                
                const startPrev5 = new Date(startLast5);
                startPrev5.setDate(startLast5.getDate() - 5);
                const endPrev5 = new Date(startLast5);
                endPrev5.setDate(startLast5.getDate() - 1);
                
                const currentSum = this.getTotal(startLast5ISO, endDate);
                const prevSum = this.getTotal(DateUtils.formatISO(startPrev5), DateUtils.formatISO(endPrev5));
                
                return { currentSum, prevSum, change: currentSum - prevSum };
            }
        };

        // Управление UI
        const UIManager = {
            updateStats(startISO, endISO) {
                const periodTotal = DataManager.getTotal(startISO, endISO);
                DOM.periodTotalValue.textContent = CurrencyUtils.format(periodTotal);
                
                const dynamics = DataManager.calculateDynamics();
                DOM.last5daysValue.textContent = CurrencyUtils.format(dynamics.currentSum);
                
                const isPositive = dynamics.change >= 0;
                DOM.last5daysChange.className = `stat-change ${isPositive ? 'positive' : 'negative'}`;
                DOM.last5daysChange.innerHTML = `
                    <i class="fas fa-arrow-${isPositive ? 'up' : 'down'}"></i> 
                    ${CurrencyUtils.formatChange(dynamics.change)}
                `;
                
                const rangeTexts = {
                    today: 'сегодня',
                    week: 'текущей недели',
                    month: 'прошлого месяца',
                    year: 'текущего года',
                    all: 'всего времени',
                    custom: `${startISO.slice(5)} — ${endISO.slice(5)}`
                };
                DOM.periodRangeText.textContent = `за ${rangeTexts[activePeriod] || ''}`;
            },
            
            updateChart(startISO, endISO) {
                const filtered = DataManager.filterByDate(startISO, endISO);
                const { labels, values, dates } = DataManager.aggregateByDate(filtered);
                
                if (lineChart) lineChart.destroy();
                
                const ctx = DOM.profitLineChart.getContext('2d');
                lineChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Прибыль (EUR)',
                            data: values,
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34,197,94,0.12)',
                            borderWidth: 3,
                            pointBackgroundColor: '#16a34a',
                            pointHoverBackgroundColor: '#22c55e',
                            pointHoverBorderColor: '#ffffff',
                            tension: 0.25,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            tooltip: {
                                backgroundColor: '#1e293b',
                                titleColor: '#ffffff',
                                bodyColor: '#e2e8f0',
                                borderColor: '#22c55e',
                                borderWidth: 1,
                                padding: 12,
                                cornerRadius: 12,
                                displayColors: false,
                                callbacks: {
                                    title: (context) => {
                                        const index = context[0].dataIndex;
                                        return dates[index] ? new Date(dates[index]).toLocaleDateString() : '';
                                    },
                                    label: (context) => `💰 ${CurrencyUtils.format(context.raw)}`
                                }
                            },
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                title: { display: true, text: 'Валюта', color: '#54708f' },
                                ticks: {
                                    callback: (val) => `€${val.toLocaleString(undefined, { maximumFractionDigits: 0 })}`
                                }
                            }
                        }
                    }
                });
                
                DOM.periodStatsLabel.textContent = DateUtils.getPeriodLabel(activePeriod, startISO, endISO);
            },
            
            updateDateButtons(activePeriod) {
                document.querySelectorAll('.date-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.period === activePeriod);
                });
            }
        };

        // Основное приложение
        const App = {
            setPeriod(period) {
                activePeriod = period;
                const { startDate, endDate } = DateUtils.getRangeForPeriod(period);
                currentStartDate = startDate;
                currentEndDate = endDate;
                
                UIManager.updateChart(currentStartDate, currentEndDate);
                UIManager.updateStats(currentStartDate, currentEndDate);
                UIManager.updateDateButtons(period);
                
                DOM.customStartDate.value = currentStartDate;
                DOM.customEndDate.value = currentEndDate;
            },
            
            applyCustomRange(startISO, endISO) {
                if (startISO && endISO && startISO <= endISO) {
                    currentStartDate = startISO;
                    currentEndDate = endISO;
                    activePeriod = 'custom';
                    
                    UIManager.updateChart(currentStartDate, currentEndDate);
                    UIManager.updateStats(currentStartDate, currentEndDate);
                    UIManager.updateDateButtons('custom');
                    
                    DOM.customStartDate.value = startISO;
                    DOM.customEndDate.value = endISO;
                    return true;
                }
                return false;
            }
        };

        // Инициализация
        function init() {
            App.setPeriod('week');
            
            document.querySelectorAll('.date-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const period = btn.dataset.period;
                    if (period) App.setPeriod(period);
                });
            });
            
            document.getElementById('applyCustomRange')?.addEventListener('click', () => {
                const start = DOM.customStartDate.value;
                const end = DOM.customEndDate.value;
                
                if (!start || !end) {
                    alert("📅 Пожалуйста, выберите обе даты");
                } else if (start > end) {
                    alert("❌ Ошибка: Дата начала не может быть позже даты окончания.");
                } else {
                    App.applyCustomRange(start, end);
                }
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    })();
</script>
</body>
</html>
